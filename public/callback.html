<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub OAuth 授权回调</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .success .icon {
      color: #28a745;
    }
    .error .icon {
      color: #dc3545;
    }
    h2 {
      color: #333;
      margin-bottom: 12px;
      font-size: 24px;
    }
    p {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container" id="status">
    <div class="spinner"></div>
    <h2>正在处理授权...</h2>
    <p>请稍候，正在完成 GitHub 授权流程</p>
  </div>

  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');
      const errorDescription = urlParams.get('error_description');
      const statusDiv = document.getElementById('status');

      function showSuccess(message) {
        statusDiv.className = 'container success';
        statusDiv.innerHTML = `
          <div class="icon">✅</div>
          <h2>授权成功</h2>
          <p>${message}</p>
        `;
      }

      function showError(message) {
        statusDiv.className = 'container error';
        statusDiv.innerHTML = `
          <div class="icon">❌</div>
          <h2>授权失败</h2>
          <p>${message}</p>
        `;
      }

      // 如果有 code，说明授权成功
      if (code) {
        // 发送消息给父窗口
        if (window.opener) {
          window.opener.postMessage(
            JSON.stringify({ 
              result: 'access_token=' + code, 
              error: null 
            }),
            window.location.origin
          );
          showSuccess('GitHub 授权成功！正在关闭窗口...');
          // 3秒后关闭窗口
          setTimeout(() => window.close(), 1500);
        } else {
          // 如果没有 opener，可能是直接访问了这个页面
          showSuccess('授权码已获取，请返回原页面完成登录');
          // 显示 code 供用户复制
          statusDiv.innerHTML += `<p style="margin-top: 20px; padding: 10px; background: #f5f5f5; border-radius: 4px; word-break: break-all; font-family: monospace; font-size: 12px;">Code: ${code}</p>`;
        }
      } 
      // 如果有 error，说明授权失败
      else if (error) {
        const errorMsg = errorDescription || error;
        if (window.opener) {
          window.opener.postMessage(
            JSON.stringify({ 
              result: null, 
              error: errorMsg 
            }),
            window.location.origin
          );
        }
        showError(errorMsg);
        setTimeout(() => window.close(), 3000);
      }
      // 既没有 code 也没有 error
      else {
        showError('无效的授权请求');
        setTimeout(() => window.close(), 3000);
      }
    })();
  </script>
</body>
</html>
